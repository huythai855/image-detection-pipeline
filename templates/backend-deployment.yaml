apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "image-detection-pipeline.fullname" . }}-backend
  namespace: {{ include "image-detection-pipeline.namespace" . }}
  labels:
    {{- include "image-detection-pipeline.labels" . | nindent 4 }}
    component: backend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "image-detection-pipeline.selectorLabels" . | nindent 6 }}
      component: backend
  template:
    metadata:
      labels:
        {{- include "image-detection-pipeline.selectorLabels" . | nindent 8 }}
        component: backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.service.port }}
              protocol: TCP
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: YOLO_MODEL
              value: {{ .Values.backend.env.YOLO_MODEL | quote }}
            - name: SAM_MODEL
              value: {{ .Values.backend.env.SAM_MODEL | quote }}
            - name: DETECTION_CONF
              value: {{ .Values.backend.env.DETECTION_CONF | quote }}
            - name: TEMP_DIR
              value: {{ .Values.backend.env.TEMP_DIR | quote }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          volumeMounts:
            - name: model-cache
              mountPath: /root/.config/Ultralytics
            - name: temp-storage
              mountPath: /app/temp
      volumes:
        - name: model-cache
          emptyDir: {}
        - name: temp-storage
          emptyDir: {}
