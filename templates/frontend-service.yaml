apiVersion: v1
kind: Service
metadata:
  name: {{ include "image-detection-pipeline.fullname" . }}-frontend
  namespace: {{ include "image-detection-pipeline.namespace" . }}
  labels:
    {{- include "image-detection-pipeline.labels" . | nindent 4 }}
    component: frontend
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "image-detection-pipeline.selectorLabels" . | nindent 4 }}
    component: frontend
