{{- if not .Values.kserve.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "image-detection-pipeline.fullname" . }}-backend
  namespace: {{ include "image-detection-pipeline.namespace" . }}
  labels:
    {{- include "image-detection-pipeline.labels" . | nindent 4 }}
    component: backend
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "image-detection-pipeline.selectorLabels" . | nindent 4 }}
    component: backend
{{- end }}
