{{- if .Values.kserve.enabled }}
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: {{ .Values.kserve.serviceName }}
  namespace: {{ include "image-detection-pipeline.namespace" . }}
  labels:
    {{- include "image-detection-pipeline.labels" . | nindent 4 }}
    component: backend
spec:
  predictor:
    containers:
      - name: backend
        image: "{{ .Values.kserve.image.repository }}:{{ .Values.kserve.image.tag }}"
        imagePullPolicy: {{ .Values.kserve.image.pullPolicy }}
        ports:
          - containerPort: {{ .Values.kserve.containerPort }}
            name: http1
        env:
          - name: PYTHONUNBUFFERED
            value: "1"
          - name: YOLO_MODEL
            value: {{ .Values.backend.env.YOLO_MODEL | quote }}
          - name: SAM_MODEL
            value: {{ .Values.backend.env.SAM_MODEL | quote }}
          - name: DETECTION_CONF
            value: {{ .Values.backend.env.DETECTION_CONF | quote }}
          - name: TEMP_DIR
            value: {{ .Values.backend.env.TEMP_DIR | quote }}
        resources:
          {{- toYaml .Values.kserve.resources | nindent 10 }}
{{- end }}

